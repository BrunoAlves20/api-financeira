services:
  db:
    image: postgres:15
    container_name: postgres-api-financeira
    environment:
      POSTGRES_USER: SEU_USER_AQUI
      POSTGRES_PASSWORD: SUA_SENHA_AQUI
      POSTGRES_DB: api_financeira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: